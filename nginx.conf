# ──────────────────────────────────────────────
# Servidor HTTP — Redirige todo el tráfico a HTTPS
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name 198.71.54.179.nip.io;

    # Redirección 301 permanente a HTTPS
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────
# Servidor HTTPS — Sirve la PWA con SSL/TLS
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name 198.71.54.179.nip.io;

    # Certificados generados por Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/198.71.54.179.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/198.71.54.179.nip.io/privkey.pem;

    # Protocolos y cifrados modernos (TLS 1.2 + 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Directorio raíz con los archivos compilados por Vite
    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing ──
    # Necesario para que React Router funcione correctamente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Service Worker ──
    # Nunca cachear el SW para que el navegador siempre detecte actualizaciones
    location /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Assets estáticos de Vite ──
    # Cache agresivo con hash de contenido (Vite incluye hash en el nombre)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # ── Imágenes e íconos ──
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Cabeceras de seguridad ──
    add_header X-Frame-Options       "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header Referrer-Policy       "strict-origin"        always;
    add_header X-XSS-Protection      "1; mode=block"        always;

    # ── Compresión Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;
}
